name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Lint (syntax check)
        run: |
          python -c "import ast, pathlib; [ast.parse(p.read_text(), filename=str(p)) for root in ('src', 'tests', 'scripts') for p in pathlib.Path(root).rglob('*.py')]"

      - name: Unit tests
        run: PYTHONPATH=src python -B -m unittest discover -s tests

      - name: End-to-end demo
        run: PYTHONPATH=src python -B -m skill_router

      - name: Routing benchmark
        run: PYTHONPATH=src python scripts/benchmark.py
